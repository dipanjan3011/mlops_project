# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This overrides the local dev config with:
# - GHCR images instead of local builds
# - Production environment variables
# - Restart policies and resource limits

services:
  api:
    image: ${IMAGE_PREFIX}-api:${IMAGE_TAG:-latest}
    build: !override
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  mlflow:
    image: ${IMAGE_PREFIX}-mlflow:${IMAGE_TAG:-latest}
    build: !override
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  airflow-webserver:
    image: ${IMAGE_PREFIX}-airflow:${IMAGE_TAG:-latest}
    build: !override
    restart: always

  airflow-scheduler:
    image: ${IMAGE_PREFIX}-airflow:${IMAGE_TAG:-latest}
    build: !override
    restart: always

  airflow-init:
    image: ${IMAGE_PREFIX}-airflow:${IMAGE_TAG:-latest}
    build: !override

  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops_password}

  redis:
    restart: always
