name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "notebooks/**"
      - ".github/workflows/ct.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/mlops

jobs:
  # ── Build & Push Docker Images ──────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: docker/Dockerfile.api
          - image: mlflow
            dockerfile: docker/Dockerfile.mlflow
          - image: airflow
            dockerfile: docker/Dockerfile.airflow
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Local Machine (self-hosted runner) ───────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy with Docker Compose
        run: |
          cd /Users/dip/projects/mlops_project

          export IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
          export IMAGE_TAG=latest

          # Stop existing dev containers and redeploy with production images
          docker compose down --remove-orphans || true

          # Pull latest GHCR images
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

          # Deploy with production overrides
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

          # Wait for services to be healthy (API depends on MLflow which takes ~2 min)
          echo "Waiting for services to start..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is healthy!"
              curl -s http://localhost:8000/health
              echo ""
              echo "Deployment successful!"
              exit 0
            fi
            echo "Waiting for API... (attempt $i/12)"
            sleep 15
          done
          echo "API did not become healthy in time"
          docker ps
          docker logs mlops_project-api-1 --tail 20
          exit 1
