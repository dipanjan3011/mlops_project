name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "notebooks/**"
      - ".github/workflows/ct.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/mlops

jobs:
  # ── Build & Push Docker Images ──────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: docker/Dockerfile.api
          - image: mlflow
            dockerfile: docker/Dockerfile.mlflow
          - image: airflow
            dockerfile: docker/Dockerfile.airflow
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Smoke Test ──────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and test API image
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}-api:latest
          docker run -d --name smoke-api -p 8000:8000 \
            -e MLFLOW_TRACKING_URI=http://localhost:5001 \
            ${{ env.IMAGE_PREFIX }}-api:latest

          # Wait for API to be ready (up to 30s)
          for i in $(seq 1 6); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              break
            fi
            echo "Waiting for API to start... (attempt $i)"
            sleep 5
          done

          STATUS=$(curl -sf http://localhost:8000/health | jq -r '.status')
          echo "API status: $STATUS"
          if [ "$STATUS" != "healthy" ] && [ "$STATUS" != "degraded" ]; then
            echo "Smoke test failed!"
            docker logs smoke-api
            exit 1
          fi
          docker stop smoke-api && docker rm smoke-api

  # ── Deploy to Local Machine (self-hosted runner) ───────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: smoke-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Copy files to deploy directory
        run: |
          DEPLOY_DIR="$HOME/mlops-deploy"
          mkdir -p "$DEPLOY_DIR"
          cp docker-compose.yml docker-compose.prod.yml "$DEPLOY_DIR/"
          cp -r config/ "$DEPLOY_DIR/config/"
          cp -r docker/ "$DEPLOY_DIR/docker/"

      - name: Deploy with Docker Compose
        run: |
          cd "$HOME/mlops-deploy"

          export IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
          export IMAGE_TAG=${{ github.sha }}

          # Pull latest images
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

          # Deploy with rolling update
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

          # Wait for services to be healthy
          echo "Waiting for services to start..."
          sleep 30

          # Verify API is healthy
          curl -sf http://localhost:8000/health || exit 1
          echo "Deployment successful!"
