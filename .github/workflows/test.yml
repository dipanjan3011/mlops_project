name: CI — Test & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ dags/
      - name: Format check
        run: ruff format --check src/ tests/ dags/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install pytest-cov
      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=src pytest tests/unit/ -v --tb=short \
            --cov=src --cov-report=xml --cov-report=term-missing
        env:
          MLFLOW_TRACKING_URI: "http://localhost:5001"
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mlops
          POSTGRES_PASSWORD: mlops_password
          POSTGRES_DB: mlops
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U mlops" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run integration tests
        run: PYTHONPATH=src pytest tests/integration/ -v --tb=short
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MLFLOW_TRACKING_URI: "http://localhost:5001"
          DATABASE_URL: "postgresql://mlops:mlops_password@localhost:5432/mlops"

  docker-build:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: mlops-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build MLflow image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.mlflow
          push: false
          tags: mlops-mlflow:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install safety
        run: pip install safety pip-audit
      - name: Check for known vulnerabilities
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-* || true
      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
