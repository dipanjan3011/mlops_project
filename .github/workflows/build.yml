name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t mlops-api:latest .

      - name: Build MLflow image
        run: docker build -f docker/Dockerfile.mlflow -t mlops-mlflow:latest .

      - name: Build Airflow image
        run: docker build -f docker/Dockerfile.airflow -t mlops-airflow:latest .

      - name: Smoke test — API starts
        run: |
          docker run -d --name smoke-api -p 8000:8000 \
            -e MLFLOW_TRACKING_URI=http://localhost:5001 \
            mlops-api:latest || true
          sleep 5
          curl -sf http://localhost:8000/health || echo "API health check (expected degraded without MLflow)"
          docker stop smoke-api || true
          docker rm smoke-api || true
